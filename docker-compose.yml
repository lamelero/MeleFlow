x-shared: &shared-node
  image: node:20-alpine
  working_dir: /usr/src/app
  environment:
    NODE_ENV: development
  volumes:
    - ./backend/src:/usr/src/app/src
    - ./backend/package.json:/usr/src/app/package.json
    - ./backend/package-lock.json:/usr/src/app/package-lock.json
    - ./backend/tsconfig.json:/usr/src/app/tsconfig.json
    - ./backend/vitest.config.ts:/usr/src/app/vitest.config.ts
    - meleflow_backend_node_modules:/usr/src/app/node_modules
  restart: unless-stopped
  networks:
    - meleflow-net

services:

  # ── Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meleflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meleflow-net

  # ── Cache / Sessions ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meleflow-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meleflow-net

  # ── Backend API ──────────────────────────────
  backend:
    <<: *shared-node
    container_name: meleflow-backend
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run dev
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/package.json:/usr/src/app/package.json
      - ./backend/package-lock.json:/usr/src/app/package-lock.json
      - ./backend/tsconfig.json:/usr/src/app/tsconfig.json
      - ./backend/vitest.config.ts:/usr/src/app/vitest.config.ts
      - ./backend/vitest.global.ts:/usr/src/app/vitest.global.ts
      - ./backend/uploads:/usr/src/app/uploads
      - ./backend/backups:/usr/src/app/backups
      - meleflow_backend_node_modules:/usr/src/app/node_modules
      - meleflow_backend_node_modules:/usr/src/app/node_modules
    env_file:
      - .env

  # ── Worker (Reminders / Cron) ────────────────
  worker:
    <<: *shared-node
    container_name: meleflow-worker
    command: sh -c "npm install && npx prisma generate && npm run dev:worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env

  # ── Frontend (Vite Dev Server) ───────────────
  frontend:
    image: node:20-alpine
    container_name: meleflow-frontend
    working_dir: /usr/src/app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend/src:/usr/src/app/src
      - ./frontend/public:/usr/src/app/public
      - ./frontend/package.json:/usr/src/app/package.json
      - ./frontend/package-lock.json:/usr/src/app/package-lock.json
      - ./frontend/tsconfig.json:/usr/src/app/tsconfig.json
      - ./frontend/vite.config.ts:/usr/src/app/vite.config.ts
      - ./frontend/index.html:/usr/src/app/index.html
      - ./frontend/capacitor.config.ts:/usr/src/app/capacitor.config.ts
      - ./frontend/android:/usr/src/app/android
      - meleflow_frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - meleflow-net

  # ── Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: meleflow-nginx
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/var/www/uploads:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - meleflow-net

networks:
  meleflow-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meleflow_backend_node_modules:
    driver: local
  meleflow_frontend_node_modules:
    driver: local
