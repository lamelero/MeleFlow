# ── Rate limiting zones ──────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # ── Hide nginx version ───────────────────────────
    server_tokens off;

    # ── Disable directory listing ────────────────────
    autoindex off;

    # ── Security headers ────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Content Security Policy (defense in depth) ──
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'" always;

    # ── Gzip ────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Frontend SPA ────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600, immutable" always;
        limit_req zone=static burst=50 nodelay;
    }

    # ── Backend API ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        resolver 127.0.0.11 valid=0s ipv6=off;
        set $backend_upstream "http://backend:3000";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── File Uploads ──────────────────────────────
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "private, max-age=3600" always;
        try_files $uri =404;
        limit_req zone=static burst=20 nodelay;
    }

    # ── WebSocket ─────────────────────────────────
    location /ws {
        resolver 127.0.0.11 valid=0s ipv6=off;
        set $backend_upstream "http://backend:3000";
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
